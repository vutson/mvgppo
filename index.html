<!DOCTYPE html>
<!--
  Файл: щоденна доповідь у форматі однієї HTML-сторінки.

  Як читати цей файл:
  1. <head> — службова частина: кодування, назва сторінки, підключення Tailwind CSS і Vue.js.
  2. <body> — видима частина форми, яку бачить користувач.
  3. <style> — власні кольори, рамки, кнопки, відступи й вигляд блоків.
  4. <script> — логіка Vue: збереження даних, показ/приховування полів, формування тексту доповіді, копіювання.

  Коротко про Vue-синтаксис у цьому файлі:
  - v-model="..." зв'язує поле форми з даними в JavaScript.
  - v-if="..." показує елемент тільки за певної умови.
  - v-for="..." створює список елементів із масиву.
  - @click, @input, @change — запускають функцію при натисканні, введенні або зміні поля.
  - :class="..." динамічно додає CSS-клас залежно від умови.
-->
<html lang="uk">
<head>
  <!-- Службова частина сторінки. Тут немає видимих полів форми. -->
  <!-- UTF-8 потрібен, щоб українські літери відображалися правильно. -->
  <meta charset="UTF-8" />
  <!-- Налаштування масштабу для телефонів і планшетів. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Назва вкладки у браузері. -->
  <title>Щоденна доповідь</title>
  <!-- Tailwind CSS дає готові класи для відступів, сітки, розмірів і вирівнювання. -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <!-- Vue.js керує логікою форми: показує поля, зберігає дані, формує доповідь. -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
</head>
<!-- body — усе, що користувач бачить на екрані. -->
<body class="min-h-screen text-slate-900 app-sun">
  <!--
    Головний контейнер Vue.
    Саме до id="app" підключається Vue у JavaScript внизу файлу.
  -->
  <div id="app" class="min-h-screen py-3 px-2 sm:px-4">
    <!-- Центральна картка форми: ширина, тінь, фон, заокруглення. -->
    <div class="w-full max-w-xl mx-auto rounded-2xl shadow-2xl p-3 sm:p-5 form-card">
      <!--
        form — сама форма.
        @submit.prevent="copyData" означає: при натисканні "Скопіювати" не перезавантажувати сторінку,
        а запустити функцію copyData(), яка копіює готову доповідь у буфер.
      -->
      <form @submit.prevent="copyData" class="space-y-3">
        <!-- Верхні кнопки-посилання. -->
        <section class="top-links-section">
          <a href="https://vutson.github.io/rew_1/" class="top-link-btn top-link-apply">Застосування</a>
          <a href="https:" class="top-link-btn top-link-status">Стан та положення</a>
        </section>

        <!-- БЛОК 1. Основні дані: дата, підрозділ, позивний, населений пункт, область. -->
        <section class="space-y-3">
          <h2 class="font-semibold section-title pb-1 text-center">ЩОДЕННА ДОПОВІДЬ</h2>

          <!-- Дата доповіді. Значення записується у formData.date. -->

          <div class="flex flex-col">
            <label for="date" class="mb-1 text-left">Дата:</label>
            <input id="date" type="date" v-model="formData.date" class="input" />
          </div>

          <!-- Вибір підрозділу зі списку units, який описаний у JavaScript. -->
          <div class="flex flex-col">
            <label for="unit" class="mb-1 text-left">Підрозділ:</label>
            <select id="unit" v-model="formData.unit" class="select" :class="formData.unit ? 'text-gray-100' : 'text-gray-400'">
              <option value="" disabled hidden>Оберіть зі списку</option>
              <option v-for="unit in units" :key="unit" :value="unit">{{ unit }}</option>
              <option value="інша">інша</option>
            </select>
          </div>

          <!-- Це поле з'являється тільки тоді, коли в підрозділі вибрано "інша". -->
          <div v-if="formData.unit === 'інша'" class="flex flex-col">
            <label class="mb-1 text-left">Інший підрозділ:</label>
            <input type="text" v-model="formData.unitOther" @input="uppercaseField(formData, 'unitOther')" placeholder="Впишіть підрозділ" class="input" />
          </div>

          <!-- Поле "Рота" показується тільки для підрозділу А1880. -->
          <div v-if="selectedUnit === 'А1880'" class="flex flex-col">
            <label for="company" class="mb-1 text-left">Рота:</label>
            <select id="company" v-model="formData.company" class="select" :class="formData.company ? 'text-gray-100' : 'text-gray-400'">
              <option value="" disabled hidden>Оберіть зі списку</option>
              <option v-for="company in companies" :key="company" :value="company">{{ company }}</option>
            </select>
          </div>

          <!-- Позивний. Під час введення normalizeCallSign() чистить зайві символи і нормалізує регістр. -->
          <div class="flex flex-col">
            <label for="callSign" class="mb-1 text-left">Позивний:</label>
            <input id="callSign" type="text" v-model="formData.callSign" @input="normalizeCallSign" placeholder="Впишіть позивний без МВГ/ВГ" class="input" />
          </div>

          <!-- Населений пункт. normalizeSettlement() переводить у верхній регістр і залишає тільки українські літери. -->
          <div class="flex flex-col">
            <label for="settlement" class="mb-1 text-left">Н.П.:</label>
            <input id="settlement" type="text" v-model="formData.settlement" @input="normalizeSettlement" placeholder="Впишіть населений пункт" class="input" />
          </div>

          <!-- Область вибирається зі списку regions у JavaScript. -->
          <div class="flex flex-col">
            <label for="oblast" class="mb-1 text-left">Область:</label>
            <select id="oblast" v-model="formData.oblast" class="select" :class="formData.oblast ? 'text-gray-100' : 'text-gray-400'">
              <option value="" disabled hidden>Оберіть зі списку</option>
              <option v-for="region in regions" :key="region" :value="region">{{ region }}</option>
            </select>
          </div>
        </section>

        <!-- БЛОК 2. Зброя: ПЗРК/ЗРК і додаткова зброя. -->
        <section class="space-y-3 pt-2">
          <div class="flex items-center justify-between gap-2 section-divider pb-1">
            <h2 class="font-semibold section-title-text">Зброя</h2>
            <!-- Кнопка додає блок "Зброя2/Зброя3". Максимум два додаткові блоки. -->
            <button type="button" @click="addWeapon" v-if="formData.weapons.length < 2" class="btn-blue">Додати</button>
          </div>

          <!-- Окремий внутрішній блок для ПЗРК/ЗРК. -->
          <div class="space-y-3 rounded-lg block-card p-3">
            <h3 class="font-semibold">ПЗРК/ЗРК</h3>

            <div class="flex flex-col">
              <label class="mb-1 text-left">ПЗРК/ЗРК:</label>
              <!-- При зміні типу запускається handlePzrkChange(), щоб очистити зайві поля. -->
              <select v-model="formData.pzrk.type" @change="handlePzrkChange" class="select">
                <option v-for="item in pzrkOptions" :key="item" :value="item">{{ item }}</option>
              </select>
            </div>

            <!--
              Якщо вибрано не "відсутній", показуються кількісні поля.
              Для ЗКР/ЗРК поле НБЖ приховується через isZrkType().
            -->
            <div v-if="formData.pzrk.type !== 'відсутній'" class="grid grid-cols-1 gap-3" :class="isZrkType(formData.pzrk.type) ? 'sm:grid-cols-1' : 'sm:grid-cols-2'">
              <div class="flex flex-col">
                <label class="mb-1 text-left">ЗКР:</label>
                <select v-model="formData.pzrk.zkr" class="select">
                  <option value="" disabled hidden>Кількість</option>
                  <option v-for="n in range(0, 6)" :key="'zkr' + n" :value="String(n)">{{ n }}</option>
                </select>
              </div>
              <!-- НБЖ показується тільки для ПЗРК. Для ЗКР/ЗРК його немає ні на екрані, ні в доповіді. -->
              <div v-if="!isZrkType(formData.pzrk.type)" class="flex flex-col">
                <label class="mb-1 text-left">НБЖ:</label>
                <select v-model="formData.pzrk.nbzh" class="select">
                  <option value="" disabled hidden>Кількість</option>
                  <option v-for="n in range(0, 6)" :key="'nbzh' + n" :value="String(n)">{{ n }}</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Підказка видно тільки поки не додано жодної додаткової зброї. -->
          <p v-if="formData.weapons.length === 0" class="text-sm text-gray-400">Додайте блок, якщо є Зброя2 або Зброя3.</p>

          <!-- v-for створює окремий блок для кожної доданої одиниці зброї. -->
          <div v-for="(weapon, index) in formData.weapons" :key="weapon.id" class="space-y-3 rounded-lg block-card p-3">
            <div class="flex items-center justify-between gap-2">
              <h3 class="font-semibold">Зброя{{ index + 2 }}</h3>
              <button type="button" @click="removeWeapon(index)" class="btn-red">Видалити</button>
            </div>

            <div class="flex flex-col">
              <label class="mb-1 text-left">Тип зброї:</label>
              <!-- При виборі типу зброї автоматично підтягується калібр/БК через syncWeaponAmmo(). -->
              <select v-model="weapon.type" @change="syncWeaponAmmo(weapon)" class="select" :class="weapon.type ? 'text-gray-100' : 'text-gray-400'">
                <option value="" disabled hidden>Оберіть зі списку</option>
                <option v-for="item in weaponOptions" :key="item" :value="item">{{ cleanWeaponName(item) }}</option>
              </select>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div class="flex flex-col">
                <label class="mb-1 text-left">Калібр:</label>
                <input type="text" :value="weapon.ammo || weaponAmmo(weapon.type)" readonly placeholder="Калібр підтягнеться автоматично" class="readonly" />
              </div>
              <div class="flex flex-col">
                <label class="mb-1 text-left">Кількість набоїв:</label>
                <input type="number" min="0" step="1" v-model="weapon.ammoQty" @input="integerField(weapon, 'ammoQty')" placeholder="Введіть кількість" class="input" />
              </div>
            </div>
          </div>
        </section>

        <!-- БЛОК 3. Стрілецька зброя: тип, кількість, калібр, кількість набоїв. -->
        <section class="space-y-3 pt-2">
          <div class="flex items-center justify-between gap-2 section-divider pb-1">
            <h2 class="font-semibold section-title-text">Стрілецька зброя</h2>
            <!-- Додає ще один блок стрілецької зброї. Обмеження: максимум два блоки. -->
            <button type="button" @click="addRifle" v-if="formData.rifles.length < 2" class="btn-blue">Додати</button>
          </div>

          <!-- Один блок стрілецької зброї. Перший є завжди, другий додається кнопкою. -->
          <div v-for="(rifle, index) in formData.rifles" :key="rifle.id" class="space-y-3 rounded-lg block-card p-3">
            <div class="flex items-center justify-between gap-2">
              <h3 class="font-semibold">Стрілецька зброя{{ index + 1 }}</h3>
              <button type="button" @click="removeRifle(index)" v-if="formData.rifles.length > 1" class="btn-red">Видалити</button>
            </div>

            <div class="flex flex-col">
              <label class="mb-1 text-left">Тип:</label>
              <!-- syncRifleAmmo() автоматично підставляє калібр для вибраної стрілецької зброї. -->
              <select v-model="rifle.type" @change="syncRifleAmmo(rifle)" class="select" :class="rifle.type ? 'text-gray-100' : 'text-gray-400'">
                <option value="" disabled hidden>Оберіть зі списку</option>
                <option v-for="item in smallArmsOptions" :key="item.name" :value="item.name">{{ item.name }}</option>
              </select>
            </div>

            <!-- Дані старшого розрахунку: звання зі списку ranks і ПІБ вручну. -->
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div class="flex flex-col">
                <label class="mb-1 text-left">Кількість:</label>
                <select v-model="rifle.qty" class="select" :class="rifle.qty ? 'text-gray-100' : 'text-gray-400'">
                  <option value="" disabled hidden>Оберіть</option>
                  <option v-for="n in range(1, 6)" :key="'rifleqty' + rifle.id + n" :value="String(n)">{{ n }}</option>
                </select>
              </div>

              <div class="flex flex-col">
                <label class="mb-1 text-left">Калібр:</label>
                <input type="text" :value="rifle.ammo || rifleAmmo(rifle.type)" readonly placeholder="Автоматично" class="readonly" />
              </div>

              <div class="flex flex-col">
                <label class="mb-1 text-left">Кількість набоїв:</label>
                <input type="number" min="0" step="1" v-model="rifle.ammoQty" @input="integerField(rifle, 'ammoQty')" placeholder="360" class="input" />
              </div>
            </div>
          </div>
        </section>

        <!-- БЛОК 4. Авто, продукти, старший розрахунку та потреби в забезпеченні. -->
        <section class="space-y-3 pt-2">
          <div class="flex items-center justify-between gap-2 section-divider pb-1">
            <h2 class="font-semibold section-title-text">Авто та забезпечення</h2>
            <!-- Авто додається тільки один раз. Якщо блок уже є, кнопка зникає. -->
            <button type="button" @click="addVehicle" v-if="!formData.vehicle.enabled" class="btn-blue">Додати Авто</button>
          </div>

          <!-- Сам блок авто. Показується тільки після натискання "Додати Авто". -->
          <div v-if="formData.vehicle.enabled" class="space-y-3 rounded-lg block-card p-3">
            <div class="flex items-center justify-between gap-2">
              <h3 class="font-semibold">Авто</h3>
              <button type="button" @click="removeVehicle" class="btn-red">Видалити</button>
            </div>

            <div class="flex flex-col">
              <label class="mb-1 text-left">Марка модель:</label>
              <!-- Марка й модель авто. uppercaseField() переводить введення у верхній регістр. -->
              <input type="text" v-model="formData.vehicle.brand" @input="uppercaseField(formData.vehicle, 'brand')" placeholder="NISSAN NAVARA" class="input" />
            </div>

            <div class="flex flex-col">
              <label class="mb-1 text-left">Вид палива:</label>
              <select v-model="formData.vehicle.fuel" class="select" :class="formData.vehicle.fuel ? 'text-gray-100' : 'text-gray-400'">
                <option value="" disabled hidden>Оберіть</option>
                <option value="ДП">ДП</option>
                <option value="АБ">АБ</option>
              </select>
            </div>

            <div class="flex flex-col">
              <label class="mb-1 text-left">Залишок пального л.:</label>
              <!-- Залишок пального: fuelLeftField() залишає тільки цифри й максимум 4 символи. -->
              <input type="text" inputmode="numeric" maxlength="4" v-model="formData.vehicle.fuelLeft" @input="fuelLeftField" placeholder="Наприклад 120" class="input" />
            </div>
          </div>

          <!-- Вибір: або дата отримання продуктів, або харчування в ППД. -->
          <div class="flex flex-col">
            <label class="mb-1 text-left">Продукти отримано:</label>
            <select v-model="formData.productsMode" class="select" :class="formData.productsMode ? 'text-gray-100' : 'text-gray-400'">
              <option value="" disabled hidden>Оберіть з варіантів</option>
              <option value="date">Вкажу дату отримання нижче</option>
              <option value="ppd">харчування в ППД</option>
            </select>
          </div>

          <!-- Дата продуктів показується тільки якщо вибрано режим "дата отримання". -->
          <div v-if="formData.productsMode === 'date'" class="flex flex-col">
            <label class="mb-1 text-left">Дата отримання продуктів:</label>
            <input type="date" v-model="formData.productsDate" class="input" />
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div class="flex flex-col sm:col-span-1">
              <label class="mb-1 text-left">Звання старшого:</label>
              <select v-model="formData.senior.rank" class="select" :class="formData.senior.rank ? 'text-gray-100' : 'text-gray-400'">
                <option value="" disabled hidden>Оберіть</option>
                <option v-for="rank in ranks" :key="rank" :value="rank">{{ rank }}</option>
              </select>
            </div>
            <div class="flex flex-col sm:col-span-2">
              <label class="mb-1 text-left">ПІБ старшого:</label>
              <input type="text" v-model="formData.senior.pib" placeholder="Залужний В.Ф.." class="input" />
            </div>
          </div>

          <!-- Вільне текстове поле для потреб у забезпеченні. -->
          <div class="flex flex-col">
            <label class="mb-1 text-left">Потреба в забезпечені:</label>
            <textarea v-model="formData.needs" rows="3" class="textarea"></textarea>
          </div>

        </section>

        <!-- БЛОК 5. Попередній перегляд: показує готовий текст, який буде скопійовано. -->
        <section class="space-y-3 pt-2">
          <h2 class="font-semibold section-title pb-1">Попередній перегляд</h2>
          <!-- buildReport() збирає всі заповнені поля в один текст доповіді. -->
          <pre class="preview-box">{{ buildReport() }}</pre>
        </section>

        <!-- БЛОК 6. Кнопки керування формою. -->
        <section class="space-y-3 pt-2">
          <!-- type="submit" запускає @submit.prevent на формі, тобто функцію copyData(). -->
          <button type="submit" class="btn-copy">Скопіювати</button>
          <!-- Очищає всі поля й видаляє збережені дані з localStorage. -->
          <button type="button" @click="clearForm" class="btn-clear">Очистити форму</button>
        </section>
      </form>
    </div>
  </div>

  <style>
    /*
      CSS-частина.
      Тут описано зовнішній вигляд: кольори, фони, рамки, кнопки, поля введення.
      Логіки форми тут немає — тільки оформлення.
    */
    /* Змінні кольорів. Їх зручно змінювати в одному місці. */
    :root {
      --page-bg: #0d2dff;
      --page-bg-2: #e4f753;
      --card-bg: rgba(255, 251, 235, 0.96);
      --field-bg: #fffaf0;
      --field-border: #9a6b2f;
      --text-main: #172033;
      --text-muted: #4b5563;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b42318;
      --danger-dark: #8f1d14;
      --blue: #1d4ed8;
      --blue-dark: #1e40af;
      --line: #c0842d;
    }

    /* Загальний фон сторінки. */
    body.app-sun {
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 215, 128, 0.75), transparent 34%),
        linear-gradient(160deg, var(--page-bg) 0%, #fff7df 44%, var(--page-bg-2) 100%);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* Головна картка форми: фон, рамка, тінь. */
    .form-card {
      background: var(--card-bg);
      border: 1px solid rgba(120, 80, 28, 0.25);
      box-shadow: 0 18px 45px rgba(46, 36, 18, 0.23);
      backdrop-filter: blur(4px);
    }

    /* Єдиний колір для підписів і заголовків. */
    label, h2, h3 {
      color: var(--text-main);
      text-shadow: none;
    }

    /* Заголовки секцій з нижньою лінією. */
    .section-title {
      color: #1f2937 !important;
      border-bottom: 2px solid var(--line) !important;
    }

    .section-title-text {
      color: #1f2937 !important;
    }

    /* Лінія-розділювач у секціях із кнопкою праворуч. */
    .section-divider {
      border-bottom: 2px solid var(--line) !important;
    }


    /* Кожна велика секція форми має власну картку з відступами та рамкою. */
    form > section {
      padding: 0.9rem;
      border-radius: 1rem;
      border: 1px solid rgba(154, 107, 47, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    /* Відтінок блоку основних даних. */
    form > section:nth-of-type(2) {
      background: rgba(255, 248, 220, 0.72);
    }

          var value = this.formData.callSign || '';
          value = value.replace(/[^а-яА-ЯіІїЇєЄґҐ0-9 \-]/g, '').replace(/\s+/g, ' ');
          value = value.toLocaleLowerCase('uk-UA');
          this.formData.callSign = value ? value.charAt(0).toLocaleUpperCase('uk-UA') + value.slice(1) : '';
        },
        // Нормалізує населений пункт: залишає українські літери і переводить у верхній регістр.
        normalizeSettlement: function () {
          var value = this.formData.settlement || '';
          this.formData.settlement = value.replace(/[^а-яА-ЯіІїЇєЄґҐ \-]/g, '').toLocaleUpperCase('uk-UA');
        },
        // Переводить конкретне поле об'єкта у верхній регістр.
        uppercaseField: function (obj, key) {
          obj[key] = (obj[key] || '').toString().toLocaleUpperCase('uk-UA');
        },
        // Залишає в полі тільки цифри.
        integerField: function (obj, key) {
          obj[key] = (obj[key] || '').toString().replace(/\D/g, '');
        },
        // Окрема перевірка залишку пального: тільки цифри, максимум 4 символи.
        fuelLeftField: function () {
          this.formData.vehicle.fuelLeft = (this.formData.vehicle.fuelLeft || '').toString().replace(/\D/g, '').slice(0, 4);
        },
        // Визначає, чи вибраний тип є ЗКР/ЗРК.
        // Якщо перші 3 літери "ЗКР" або "ЗРК", поле НБЖ не потрібне.
        isZrkType: function (type) {
          var value = (type || '').toString().trim().toLocaleUpperCase('uk-UA');
          return value.slice(0, 3) === 'ЗКР' || value.slice(0, 3) === 'ЗРК';
        },
        // Реакція на зміну ПЗРК/ЗРК: чистить кількість, якщо вибрано "відсутній", і прибирає НБЖ для ЗКР/ЗРК.
        handlePzrkChange: function () {
          if (this.formData.pzrk.type === 'відсутній') {
            this.formData.pzrk.zkr = '';
            this.formData.pzrk.nbzh = '';
          }
          if (this.isZrkType(this.formData.pzrk.type)) this.formData.pzrk.nbzh = '';
        },
        // Показує блок авто.
        addVehicle: function () {
          if (!this.formData.vehicle) this.formData.vehicle = this.emptyVehicle();
          this.formData.vehicle.enabled = true;
        },
        // Видаляє блок авто й очищає його поля.
        removeVehicle: function () {
          this.formData.vehicle = this.emptyVehicle();
        },
        // Додає блок додаткової зброї, якщо їх менше двох.
        addWeapon: function () {
          if (this.formData.weapons.length < 2) this.formData.weapons.push(this.newWeapon());
        },
        // Видаляє додаткову зброю за її номером у списку.
        removeWeapon: function (index) {
          this.formData.weapons.splice(index, 1);
        },
        // Додає другий блок стрілецької зброї.
        addRifle: function () {
          if (this.formData.rifles.length < 2) this.formData.rifles.push(this.newRifle());
        },
        // Видаляє блок стрілецької зброї, але перший блок залишає завжди.
        removeRifle: function (index) {
          if (this.formData.rifles.length > 1) this.formData.rifles.splice(index, 1);
        },
        // Записує калібр у блок додаткової зброї після вибору типу.
        syncWeaponAmmo: function (weapon) {
          weapon.ammo = this.weaponAmmo(weapon.type);
        },
        // Записує калібр у блок стрілецької зброї після вибору типу.
        syncRifleAmmo: function (rifle) {
          rifle.ammo = this.rifleAmmo(rifle.type);
        },
        // Повертає калібр/БК для додаткової зброї.
        weaponAmmo: function (type) {
          return this.weaponAmmoMap[type] || '';
        },
        // Повертає калібр для стрілецької зброї.
        rifleAmmo: function (type) {
          var found = this.smallArmsOptions.find(function (item) { return item.name === type; });
          return found ? found.ammo : '';
        },
        // Прибирає калібр із назви зброї для красивого виведення у доповіді.
        // Наприклад "Browning M2 12.7" у доповіді стане "Browning M2".
        cleanWeaponName: function (name) {
          return (name || '')
            .replace(/\s+12\.7$/, '')
            .replace(/\s+14\.5$/, '')
            .replace(/\s+20мм\.?$/, '')
            .replace(/\s+23мм$/, '')
            .replace(/\s+30мм$/, '')
            .replace(/\s+35мм$/, '')
            .replace(/\s+40мм\.?$/, '')
            .replace(/\s+57мм$/, '');
        },
        // Перетворює дату з формату браузера YYYY-MM-DD у звичний DD.MM.YYYY.
        formatDate: function (dateStr) {
          if (!dateStr) return '';
          var parts = dateStr.split('-');
          if (parts.length !== 3) return dateStr;
          return parts[2] + '.' + parts[1] + '.' + parts[0];
        },
        // Формує рядок про продукти: або дата, або "харчування в ППД".
        productsLine: function () {
          if (!this.formData.productsMode) return '';
          if (this.formData.productsMode === 'ppd') return 'харчування в ППД';
          return this.formatDate(this.formData.productsDate);
        },
        // Повертає назву авто без зайвих пробілів.
        vehicleLine: function () {
          return (this.formData.vehicle && this.formData.vehicle.brand ? this.formData.vehicle.brand : '').trim();
        },
        // Головна функція: збирає всі поля форми в готовий текст доповіді.
        buildReport: function () {
          if (!this.formData) return '';
          var f = this.formData;

          // lines — масив рядків. Наприкінці вони з'єднаються через перенос рядка.
          var lines = [];

          lines.push('Дата: ' + this.formatDate(f.date));
          lines.push('Підрозділ: ' + (this.selectedUnit || ''));
          lines.push('Позивний: ' + this.calculationType + (f.callSign ? ' ' + f.callSign : ''));
          lines.push('Н.П.: ' + (f.settlement || ''));
          lines.push('Область: ' + (f.oblast || ''));

          // Блок ПЗРК/ЗРК: якщо відсутній — пишемо "відсутній"; інакше додаємо тип і кількість.
          if (f.pzrk.type === 'відсутній') {
            lines.push('ПЗРК/ЗРК: відсутній');
          } else {
            var pzrkCountsList = [f.pzrk.zkr];
            if (!this.isZrkType(f.pzrk.type)) pzrkCountsList.push(f.pzrk.nbzh);
            var pzrkCounts = pzrkCountsList.filter(Boolean).join('/');
            lines.push('ПЗРК/ЗРК: ' + f.pzrk.type + (pzrkCounts ? ' - ' + pzrkCounts : ''));
          }

          // Додаємо в доповідь усі заповнені блоки додаткової зброї.
          f.weapons.forEach(function (weapon, index) {
            if (!weapon.type) return;
            lines.push('Зброя' + (index + 2) + ': ' + this.cleanWeaponName(weapon.type));
            lines.push('БК: ' + (weapon.ammo || this.weaponAmmo(weapon.type)) + ' - ' + (weapon.ammoQty || '0'));
          }, this);

          // Додаємо в доповідь усі заповнені блоки стрілецької зброї.
          f.rifles.forEach(function (rifle) {
            if (!rifle.type) return;
            lines.push('Стр. зброя: ' + rifle.type + ' - ' + (rifle.qty || '0'));
            lines.push('БК: ' + (rifle.ammo || this.rifleAmmo(rifle.type)) + ' - ' + (rifle.ammoQty || '0'));
          }, this);

          // Авто потрапляє в доповідь тільки якщо введена марка/модель.
          var hasVehicle = !!this.vehicleLine();
          if (hasVehicle) {
            lines.push('Авто: ' + this.vehicleLine());
            var fuelBalance = f.vehicle.fuel && f.vehicle.fuelLeft
              ? f.vehicle.fuel + '-' + f.vehicle.fuelLeft
              : (f.vehicle.fuel || f.vehicle.fuelLeft || '');
            if (fuelBalance) lines.push('Залишок пального л.: ' + fuelBalance);
          }
          lines.push('Продукти отримано: ' + this.productsLine());
          lines.push('Старший розрахунку: ' + [f.senior.rank, f.senior.pib].filter(Boolean).join(' '));
          lines.push('Потреба в забезпечені: ' + (f.needs || ''));

          return lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
        },
        // Копіює готовий текст доповіді в буфер обміну.
        copyData: function () {
          var text = this.buildReport();
          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(function () {
              alert('Доповідь скопійовано');
            }).catch(function () {
              this.fallbackCopy(text);
            }.bind(this));
          } else {
            this.fallbackCopy(text);
          }
        },
        // Запасний спосіб копіювання для старих браузерів або локальних файлів.
        fallbackCopy: function (text) {
          var textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.setAttribute('readonly', '');
          textarea.style.position = 'absolute';
          textarea.style.left = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          try {
            document.execCommand('copy');
            alert('Доповідь скопійовано');
          } catch (e) {
            alert('Не вдалося скопіювати. Скопіюйте текст вручну.');
          }
          document.body.removeChild(textarea);
        },
        // Повністю очищає форму і видаляє збережену чернетку з localStorage.
        clearForm: function () {
          this.formData = this.emptyForm();
          localStorage.removeItem(this.storageKey);
        }
      }
    });
  </script>
